<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кулинарная Студия "Шеф-Повар"</title>
    <style>
        :root {
            --bg-color: #fffaf5;
            --card-bg: #ffffff;
            --text-color: #4a2c11;
            --accent-color: #e05a47;
            --accent-hover: #c44736;
        }
        .dark-theme {
            --bg-color: #2c1a11;
            --card-bg: #3d2a1e;
            --text-color: #f7ede2;
            --accent-color: #ff7a66;
            --accent-hover: #e05a47;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
        }
        h1 { margin: 0; color: var(--accent-color); }
        .controls { display: flex; gap: 15px; align-items: center; }
        input, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: var(--accent-hover); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 100fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(224,90,71,0.1);
        }
        .card h3 { margin-top: 0; color: var(--accent-color); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍳 Кулинарная Студия "Шеф-Повар"</h1>
        <div class="controls">
            <!-- ФИЧА 1: Поиск и фильтрация -->
            <input type="text" id="searchInput" placeholder="Поиск мастер-класса..." oninput="filterClasses()">
            <!-- ФИЧА 2: Переключение темной темы -->
            <button onclick="toggleTheme()">🌓 Тема</button>
            <!-- ФИЧА 3: Быстрая ссылка (Поделиться) -->
            <button onclick="shareStudio()">🔗 Поделиться</button>
        </div>
    </header>

    <main class="grid" id="catalog-grid">
        <!-- Сюда ИИ и JS загрузят наши "маршруты" из бэка в виде мастер-классов -->
        <div class="card">
            <h3>Загрузка аппетитных мастер-классов...</h3>
            <p>Если загрузка долгая, проверьте, запущен ли бэкенд на порту 8080.</p>
        </div>
    </main>

    <!-- Модальное окно бронирования -->
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <h3 style="color: var(--accent-color)">Запись на мастер-класс</h3>
            <form id="bookingForm" onsubmit="submitBooking(event)">
                <input type="hidden" id="slotId">
                <div style="margin-bottom: 15px;">
                    <label>Ваше Имя:</label><br>
                    <!-- БАГ 1: Был без валидации. ИСПРАВЛЕНО: Добавлен атрибут required -->
                    <input type="text" id="clientName" style="width:100%; margin-top:5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Телефон:</label><br>
                    <input type="tel" id="clientPhone" style="width:100%; margin-top:5px;" required>
                </div>
                <div style="display:flex; gap:10px; justify-content: flex-end;">
                    <button type="button" style="background:#ccc; color:#000;" onclick="closeModal()">Отмена</button>
                    <button type="submit">Записаться</button>
                </div>
            </form>
        </div>
    </map>

    <script>
        let allSlots = [];

        // Базовый URL вашего работающего бэкенда
        const API_URL = 'http://localhost:8080';

        // Загрузка РЕАЛЬНЫХ данных из бэкенда при старте
        async function loadCatalog() {
            try {
                // Делаем запрос к правильному эндпоинту, который вернул вам JSON
                const response = await fetch(`${API_URL}/slots`);
                
                // БАГ 2: Обработка ошибок сети отсутствовала. ИСПРАВЛЕНО:
                if (!response.ok) throw new Error('Ошибка сервера при получении данных');
                
                const data = await response.json();
                
                // Достаем массив из поля "items", который прислал сервер
                allSlots = data.items || [];
                renderCatalog(allSlots);
            } catch (error) {
                console.error(error);
                document.getElementById('catalog-grid').innerHTML = `
                    <div class="card" style="grid-column: 1/-1; text-align:center;">
                        <h3 style="color:red;">⚠️ Не удалось загрузить расписание</h3>
                        <p>Ошибка подключения к бэкенду. Убедитесь, что Docker работает на порту 8080.</p>
                    </div>`;
            }
        }

        // Адаптация данных бэкенда под Кулинарную студию "на лету"
        function renderCatalog(slots) {
            const grid = document.getElementById('catalog-grid');
            if (slots.length === 0) {
                grid.innerHTML = '<p>Мастер-классы не найдены.</p>';
                return;
            }

            grid.innerHTML = slots.map(slot => {
                // Маскируем SUP-маршруты под Кулинарные мастер-классы
                let className = slot.route.name;
                let classDescription = "Интерактивный кулинарный урок с дегустацией приготовленных блюд под руководством профессионала.";
                
                if (className === "Острова и каналы") {
                    className = "🍝 Секреты итальянской пасты ручной работы";
                    classDescription = "Научимся замешивать правильное тесто для пасты и готовить классические соусы: Болоньезе и Карбонара.";
                } else if (className === "Большая вода") {
                    className = "🥩 Идеальный стейк и соусы к мясу";
                    classDescription = "Шеф-повар расскажет всё о степенях прожарки мяса, выборе отрубов и правильном запечатывании соков.";
                }

                // Превращаем ISO дату в красивый человеческий формат для расписания
                const classDate = new Date(slot.start_at).toLocaleString('ru-RU', {
                    month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                return `
                    <div class="card">
                        <h3>${className}</h3>
                        <p>${classDescription}</p>
                        <div style="margin: 10px 0; font-size: 14px; font-weight: bold; color: var(--accent-color);">
                            📅 Расписание: ${classDate}
                        </div>
                        <div style="margin: 5px 0; font-size: 13px; opacity: 0.8;">
                            🧑‍🍳 Шеф-повар: ${slot.instructor.name || 'Наш шеф'}
                        </div>
                        <div style="margin: 5px 0; font-size: 13px; opacity: 0.8;">
                            ⏱️ Длительность: ${slot.route.duration_min || 90} мин.
                        </div>
                        <div style="margin: 10px 0; font-size: 16px; font-weight: bold;">
                            💰 Стоимость: ${slot.price} ₽
                        </div>
                        <div style="margin-bottom: 15px; font-size: 12px; color: green;">
                            🪑 Свободных мест на кухне: ${slot.free_seats}
                        </div>
                        <button onclick="openBooking('${slot.id}')">Записаться на мастер-класс</button>
                    </div>
                `;
            }).join('');
        }

        // Реализация ФИЧИ 1: Фильтрация/Поиск на клиенте
        function filterClasses() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSlots.filter(slot => {
                const name = slot.route.name.toLowerCase();
                return name.includes(query) || slot.instructor.name.toLowerCase().includes(query);
            });
            renderCatalog(filtered);
        }

        // Реализация ФИЧИ 2: Смена темы
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }

        // Реализация ФИЧИ 3: Кнопка "Поделиться"
        function shareStudio() {
            navigator.clipboard.writeText(window.location.href);
            alert('Ссылка на нашу кулинарную студию скопирована в буфер обмена!');
        }

        function openBooking(slotId) {
            // БАГ 3: Жёстко зашитый ID слота. ИСПРАВЛЕНО: Привязываем к ID реального выбранного слота из бэка
            document.getElementById('slotId').value = slotId; 
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        async function submitBooking(event) {
            event.preventDefault();
            const slotId = document.getElementById('slotId').value;
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;

            try {
                // Отправляем РЕАЛЬНЫЙ POST-запрос на создание бронирования в бэкенд
                const response = await fetch(`${API_URL}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slot_id: slotId, client_name: name, client_phone: phone })
                });

                if (response.ok) {
                    alert('🎉 Вы успешно записались на мастер-класс в базу данных бэкенда! Ждем вас!');
                    closeModal();
                    loadCatalog(); // Перезагружаем каталог, чтобы бэк обновил количество свободных мест!
                } else {
                    alert('Не удалось оформить запись. Проверьте корректность данных.');
                }
            } catch (e) {
                alert('Ошибка сети при отправке бронирования.');
            }
        }

        // Запуск приложения
        loadCatalog();

    </script>
</body>
</html>
